<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Job Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">AI JOB ASSISTANT</p>
      <h1>Find your best-fit jobs in one click.</h1>
      <p class="subtitle">Paste your resume text, discover matching jobs, and auto apply quickly.</p>
    </header>

    <section class="panel">
      <label for="resumeText">Resume Text</label>
      <textarea id="resumeText" rows="8" placeholder="Paste your resume text here..."></textarea>

      <div class="actions">
        <button id="findJobsBtn" class="btn-primary" type="button">Find Jobs</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section>
      <div class="jobs-header">
        <h2>Matched Jobs</h2>
      </div>
      <div id="jobList" class="job-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
